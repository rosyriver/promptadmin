<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>数据迁移导出</title>
<style>
  body { font-family: system-ui; max-width: 600px; margin: 50px auto; padding: 20px; background: #F6F6F4; }
  .card { background: #fff; border-radius: 16px; padding: 24px; border: 1px solid #E4E4E7; }
  button { padding: 10px 20px; border: none; border-radius: 10px; background: #7C3AED; color: #fff; font-size: 14px; cursor: pointer; }
  button:hover { background: #6D28D9; }
  code { background: #F4F4F5; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  pre { background: #18181B; color: #22D3EE; padding: 16px; border-radius: 12px; overflow-x: auto; font-size: 12px; }
  .step { color: #71717A; font-size: 14px; margin: 8px 0; }
</style></head><body>
<div class="card">
  <h2>数据迁移 - 导出</h2>
  <p class="step">1. 确保你是在<b>之前使用的浏览器</b>中打开此页面（数据在浏览器里）</p>
  <p class="step">2. 点击下方按钮导出数据</p>
  <p class="step">3. 下载 <code>prompt-export.json</code> 文件</p>
  <p class="step">4. 在桌面版应用中，打开<b>设置 → 导入数据</b>，选择该文件</p>
  <button onclick="doExport()">导出数据</button>
  <pre id="log" style="margin-top:16px; display:none;"></pre>
</div>
<script>
async function doExport() {
  const log = document.getElementById('log');
  log.style.display = 'block';
  log.textContent = '正在读取数据库...';

  const DB_NAME = 'prompt-library';
  const request = indexedDB.open(DB_NAME, 2);

  request.onerror = () => {
    log.textContent = '❌ 无法打开数据库。请确保在此浏览器中打开过 Prompt Case Library。';
  };

  request.onsuccess = async () => {
    const db = request.result;

    // Read cases
    const cases = await new Promise((resolve) => {
      const tx = db.transaction('cases', 'readonly');
      const r = tx.objectStore('cases').getAll();
      r.onsuccess = () => resolve(r.result);
    });

    db.close();

    const exportData = { version: 4, exportedAt: new Date().toISOString(), cases };
    const jsonStr = JSON.stringify(exportData, null, 2);
    const blob = new Blob([jsonStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `prompt-export.json`; a.click();
    URL.revokeObjectURL(url);
    log.textContent = `✅ 导出成功！${cases.length} 条记录（仅元数据）。\n导入桌面后，逐个打开 case 重新上传源文件即可。`;
  };
}
</script>
</body></html>
